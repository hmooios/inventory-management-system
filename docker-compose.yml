services:
  mongo:
    image: mongo:7
    container_name: inventory-mongo
    profiles:
      - with-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    container_name: inventory-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
        required: false
    environment:
      NODE_ENV: dev
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-mongodb://host.docker.internal:27018/inventory-management}
      JWT_SECRET: local_inventory_secret
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules

  client:
    build:
      context: ./client
    container_name: inventory-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_BASE_URL: http://localhost:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

  customer-client:
    build:
      context: ./customer-client
    container_name: inventory-customer-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_BASE_URL: http://localhost:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5174"
    volumes:
      - ./customer-client:/app
      - customer_client_node_modules:/app/node_modules

volumes:
  mongo_data:
  server_node_modules:
  client_node_modules:
  customer_client_node_modules:
