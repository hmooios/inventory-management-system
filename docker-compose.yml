services:
  mongo:
    image: mongo:7
    container_name: inventory-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    container_name: inventory-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-dev}
      PORT: ${PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - ./uploads:/app/uploads

  client:
    build:
      context: ./client
    container_name: inventory-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_BASE_URL: ${VITE_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5175:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

  customer-client:
    build:
      context: ./customer-client
    container_name: inventory-customer-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_BASE_URL: ${VITE_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5174"
    volumes:
      - ./customer-client:/app
      - customer_client_node_modules:/app/node_modules

volumes:
  mongo_data:
  server_node_modules:
  client_node_modules:
  customer_client_node_modules:
